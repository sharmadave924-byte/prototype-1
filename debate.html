<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debate & Queries | ZENITH ARC</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-container": "#201f1f",
                        "surface-variant": "#353534",
                        "on-surface": "#e5e2e1",
                        "on-surface-variant": "#c4c6cd",
                        "background": "#131313",
                        "outline-variant": "#44474d",
                        "secondary-container": "#ff571a",
                        "on-secondary-container": "#521300",
                        "primary": "#b7c7e4",
                    },
                    fontFamily: {
                        "display-lg": ["Bebas Neue"],
                        "label-md": ["Montserrat"],
                        "body-lg": ["EB Garamond"],
                        "display-md": ["Bebas Neue"],
                        "body-md": ["EB Garamond"]
                    }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .text-shadow-glow { text-shadow: 0 0 20px rgba(255, 87, 26, 0.5); }
        .box-shadow-glow { box-shadow: 0 0 30px rgba(255, 87, 26, 0.1); }
    </style>
</head>
<body class="bg-[#131313] text-on-surface font-body-lg antialiased overflow-x-hidden min-h-screen flex flex-col">
    <nav class="fixed top-0 left-0 w-full z-50 justify-between items-center px-4 md:px-16 py-6 hidden md:flex transition-all duration-500 backdrop-blur-sm bg-background/50 border-b border-outline-variant/30">
        <div class="flex items-center gap-4">
            <a href="index.html" class="font-display-lg text-lg text-on-surface tracking-tighter opacity-90">ZENITH ARC</a>
        </div>
        <div class="flex items-center gap-12">
            <a class="font-display-md text-sm uppercase tracking-[0.3em] text-on-surface/60 hover:text-on-surface hover:scale-105 transition-all duration-300" href="index.html">Techniques</a>
        </div>
    </nav>

    <main class="flex-grow w-full relative pt-32 pb-16 px-4 md:px-16 flex items-center justify-center">
        <!-- Background Elements -->
        <div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
            <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-secondary-container/5 rounded-full blur-3xl"></div>
            <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-primary/5 rounded-full blur-3xl"></div>
        </div>

        <div class="relative z-10 w-full max-w-3xl">
            <div class="text-center mb-12">
                <span class="inline-block bg-surface-variant/50 text-on-surface-variant font-label-md text-[12px] px-3 py-1 rounded-sm uppercase tracking-wider mb-4 border border-outline-variant/30 backdrop-blur-sm">The Forum</span>
                <h1 class="font-display-lg text-[48px] md:text-[72px] text-on-surface mb-4 uppercase tracking-wide text-shadow-glow">Debate & Queries</h1>
                <p class="font-body-md text-lg text-on-surface-variant max-w-xl mx-auto">Challenge the masters, question the techniques, or seek guidance on your path. Submit your inquiries below to engage with the site owner.</p>
            </div>

            <form action="https://formsubmit.co/hitrankrush1@gmail.com" method="POST" class="bg-surface-container/60 backdrop-blur-xl border border-outline-variant/30 rounded-2xl p-8 md:p-12 box-shadow-glow">
                <!-- FormSubmit Configuration -->
                <input type="hidden" name="_subject" value="New ZENITH ARC Debate Inquiry">
                <input type="hidden" name="_template" value="table">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
                    <div>
                        <label for="name" class="block font-label-md text-sm uppercase text-on-surface-variant mb-2">Your Name</label>
                        <input type="text" name="name" id="name" required class="w-full bg-background/50 border border-outline-variant/50 rounded-lg px-4 py-3 text-on-surface font-body-md focus:border-secondary-container focus:ring-1 focus:ring-secondary-container transition-colors outline-none" placeholder="Enter your alias">
                    </div>
                    <div>
                        <label for="philosophy" class="block font-label-md text-sm uppercase text-on-surface-variant mb-2">Subject Philosophy</label>
                        <select id="philosophy" name="philosophy" class="w-full bg-background/50 border border-outline-variant/50 rounded-lg px-4 py-3 text-on-surface font-body-md focus:border-secondary-container focus:ring-1 focus:ring-secondary-container transition-colors outline-none appearance-none">
                            <option value="general">General Inquiry</option>
                            <option value="stoicism">Stoicism (Breath of Stone)</option>
                            <option value="existentialism">Existentialism (Breath of Flame)</option>
                            <option value="taoism">Taoism (Breath of Water)</option>
                            <option value="absurdism">Absurdism (Breath of Mist)</option>
                        </select>
                    </div>
                </div>
                
                <div class="mb-8">
                    <label for="query" class="block font-label-md text-sm uppercase text-on-surface-variant mb-2">Your Debate / Query</label>
                    <textarea id="query" name="message" rows="6" required class="w-full bg-background/50 border border-outline-variant/50 rounded-lg px-4 py-3 text-on-surface font-body-md focus:border-secondary-container focus:ring-1 focus:ring-secondary-container transition-colors outline-none resize-none" placeholder="State your argument or question clearly..."></textarea>
                </div>

                <div class="text-center">
                    <button type="submit" class="bg-secondary-container text-on-secondary-container font-label-md text-sm uppercase px-10 py-4 rounded hover:bg-[#ff7340] transition-all duration-300 shadow-[0_0_20px_rgba(255,87,26,0.4)] tracking-wider">
                        Send to the Master
                    </button>
                </div>
            </form>
        </div>
    </main>
    <script src="transition.js"></script>
</body>
</html>
